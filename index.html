<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0b">
    <meta name="description" content="Track your workouts and progress with this mobile-friendly training app">
</head>
<body>
    <div id="app">

        <!-- Auth Screen -->
        <div id="auth-screen" class="screen active">
            <div class="auth-container">
                <div class="auth-brand">
                    <span class="brand-mark">TT</span>
                    <h1>Training Tracker</h1>
                    <p>Track your gains. Own your progress.</p>
                </div>
                <div class="auth-card">
                    <div class="auth-tabs">
                        <button class="auth-tab active" id="login-tab">Log in</button>
                        <button class="auth-tab" id="signup-tab">Sign up</button>
                    </div>
                    <form id="auth-form">
                        <div class="field">
                            <label for="auth-email">Email</label>
                            <input type="email" id="auth-email" placeholder="you@example.com" required autocomplete="email">
                        </div>
                        <div class="field">
                            <label for="auth-password">Password</label>
                            <input type="password" id="auth-password" placeholder="••••••••" required autocomplete="current-password" minlength="6">
                        </div>
                        <button type="submit" class="btn btn-primary btn-full" id="auth-submit">Log in</button>
                    </form>
                    <p class="auth-error" id="auth-error"></p>
                </div>
            </div>
        </div>

        <!-- Main Menu -->
        <div id="main-menu" class="screen">
            <div class="main-header">
                <div class="main-header-row">
                    <div class="brand">
                        <span class="brand-mark brand-mark-sm">TT</span>
                        <span class="brand-name">Training Tracker</span>
                    </div>
                    <button class="logout-btn" id="logout-btn">Log out</button>
                </div>
                <p class="motivational-quote" id="quote"></p>
            </div>

            <div class="section-label">Programs</div>
            <div class="program-grid">
                <button class="program-btn" data-program="chest-triceps">
                    <span class="program-cat">Push</span>
                    <span class="name">Chest &amp; Triceps</span>
                </button>
                <button class="program-btn" data-program="shoulder-biceps">
                    <span class="program-cat">Push / Pull</span>
                    <span class="name">Shoulder &amp; Biceps</span>
                </button>
                <button class="program-btn" data-program="back">
                    <span class="program-cat">Pull</span>
                    <span class="name">PullPass</span>
                </button>
                <button class="program-btn" data-program="legs">
                    <span class="program-cat">Legs</span>
                    <span class="name">Legs</span>
                </button>
                <button class="program-btn" data-program="abs">
                    <span class="program-cat">Core</span>
                    <span class="name">Abs</span>
                </button>
                <button class="program-btn" data-program="arms">
                    <span class="program-cat">Pull</span>
                    <span class="name">Arms</span>
                </button>
                <button class="program-btn" data-program="chest">
                    <span class="program-cat">Push</span>
                    <span class="name">Chest</span>
                </button>
            </div>

            <div class="bottom-nav">
                <button class="nav-btn" id="history-btn">History</button>
                <button class="nav-btn" id="progress-btn">Progress</button>
            </div>
        </div>

        <!-- Workout Screen -->
        <div id="workout-screen" class="screen">
            <div class="header">
                <button class="back-btn" id="back-to-menu">←</button>
                <h2 id="workout-title"></h2>
                <div class="workout-timer-container">
                    <span class="timer-label">Time</span>
                    <span class="timer-value" id="workout-timer">0min 0sec</span>
                </div>
            </div>

            <div class="workout-form">
                <div id="last-workout-container"></div>

                <!-- Rest Timer -->
                <div id="rest-timer-container" class="rest-timer-container">
                    <div class="rest-timer-header">
                        <h3>Rest Timer</h3>
                        <div class="rest-timer-controls">
                            <select id="rest-interval-select">
                                <option value="30">30s</option>
                                <option value="60">1min</option>
                                <option value="90" selected>1.5min</option>
                                <option value="120">2min</option>
                                <option value="180">3min</option>
                                <option value="300">5min</option>
                            </select>
                        </div>
                    </div>
                    <div class="rest-timer-display">
                        <div class="rest-timer-circle">
                            <div class="rest-timer-time" id="rest-timer-time">1:30</div>
                            <div class="rest-timer-progress" id="rest-timer-progress"></div>
                        </div>
                    </div>
                    <div class="rest-timer-actions">
                        <button class="btn btn-primary" id="start-rest-btn" style="display: none;">Start Rest</button>
                        <button class="btn btn-secondary" id="reset-rest-btn" style="display: none;">Reset</button>
                        <button class="btn btn-secondary" id="skip-rest-btn" style="display: none;">Skip Rest</button>
                        <button class="btn btn-primary" id="extend-rest-btn" style="display: none;">+30s</button>
                    </div>
                </div>

                <div id="exercises-container"></div>

                <div class="form-actions">
                    <button class="btn btn-primary" id="save-workout">Save Workout</button>
                </div>
            </div>
        </div>

        <!-- History Screen -->
        <div id="history-screen" class="screen">
            <div class="header">
                <button class="back-btn" id="back-from-history">←</button>
                <h2>Workout History</h2>
            </div>

            <div class="history-filters">
                <select id="program-filter">
                    <option value="">All Programs</option>
                    <option value="chest-triceps">Chest &amp; Triceps</option>
                    <option value="shoulder-biceps">Shoulder &amp; Biceps</option>
                    <option value="back">PullPass</option>
                    <option value="legs">Legs</option>
                    <option value="abs">Abs</option>
                    <option value="arms">Arms</option>
                    <option value="chest">Chest</option>
                </select>
            </div>

            <div id="history-list"></div>
        </div>

        <!-- Progress Screen -->
        <div id="progress-screen" class="screen">
            <div class="header">
                <button class="back-btn" id="back-from-progress">←</button>
                <h2>Progress Tracking</h2>
            </div>

            <div class="progress-filters">
                <select id="exercise-select">
                    <option value="">Select Exercise</option>
                </select>
            </div>

            <div id="progress-chart"></div>
        </div>

    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
